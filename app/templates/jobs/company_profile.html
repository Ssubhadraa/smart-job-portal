{% extends "base.html" %}
{% block title %}Company Profile — Smart Job Portal{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Company Profile</h1>
</div>

<form method="post" class="form card">
    <div class="form-group">
        <label for="company_name">Company Name</label>
        <input type="text" id="company_name" name="company_name" value="{{ company.company_name }}" required>
    </div>
    <div class="form-group">
        <label for="industry">Industry</label>
        <input type="text" id="industry" name="industry" value="{{ company.industry or '' }}">
    </div>
    <div class="form-group">
        <label for="website">Website</label>
        <input type="url" id="website" name="website" value="{{ company.website or '' }}">
    </div>
    <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="6">{{ company.description or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save Profile</button>
</form>
{% endblock %}
