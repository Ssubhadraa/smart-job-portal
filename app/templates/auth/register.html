{% extends "base.html" %}
{% block title %}Register — Smart Job Portal{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Create Account</h1>
    <p class="subtitle">Join as a student or company</p>
    <form method="post" class="form" id="register-form">
        <div class="form-group">
            <label>I am a</label>
            <div class="role-toggle">
                <label class="role-option">
                    <input type="radio" name="role" value="student" checked> Student
                </label>
                <label class="role-option">
                    <input type="radio" name="role" value="company"> Company
                </label>
            </div>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group student-field">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name">
        </div>
        <div class="form-group company-field hidden">
            <label for="company_name">Company Name</label>
            <input type="text" id="company_name" name="company_name">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <small>Min 8 chars, 1 uppercase, 1 digit</small>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.querySelectorAll('input[name="role"]').forEach(radio => {
    radio.addEventListener('change', () => {
        const isStudent = document.querySelector('input[name="role"]:checked').value === 'student';
        document.querySelector('.student-field').classList.toggle('hidden', !isStudent);
        document.querySelector('.company-field').classList.toggle('hidden', isStudent);
    });
});
</script>
{% endblock %}
